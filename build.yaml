# Pin ZMK v0.3.0 for stable nice!nano_v2 UF2 boot (ZMK main/Zephyr 4.1 is still volatile).
---
include:
  - board: nice_nano_v2
    shield: budget_corne_left
    artifact-name: budget_corne_left
  - board: nice_nano_v2
    shield: budget_corne_right
    artifact-name: budget_corne_right
  - board: nice_nano
    shield: budget_corne_left
    artifact-name: budget_corne_left_v1
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
